# Configuración de Netlify para Integriva (sitio estático).
# En cada deploy generamos config.js desde las variables de entorno,
# así las credenciales NO quedan escritas en el repositorio.
[build]
  command = "bash generate-config.sh"
  publish = "."

# SPA fallback: cualquier ruta (ej. /verificacion) sirve index.html y la app
# resuelve la pantalla. Los archivos reales (styles.css, app.js…) se sirven igual.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
